name: 'PRISM D1 Metrics Emitter'
description: >
  Collects AI-DLC metrics from git history and CI context, then emits
  structured PRISM events to EventBridge. Use as a step in any workflow.

inputs:
  event-type:
    description: 'Event type to emit: deploy or pr'
    required: true
    default: 'deploy'
  team-id:
    description: 'PRISM team identifier'
    required: true
  aws-region:
    description: 'AWS region for EventBridge'
    required: false
    default: 'us-west-2'
  event-bus-name:
    description: 'EventBridge bus name'
    required: false
    default: 'prism-d1-metrics'
  base-ref:
    description: 'Base branch/ref for diff analysis (defaults to main)'
    required: false
    default: 'origin/main'

outputs:
  events-emitted:
    description: 'Number of EventBridge events emitted'
    value: ${{ steps.emit.outputs.events_emitted }}
  ai-to-merge-ratio:
    description: 'Ratio of AI-origin commits to total commits'
    value: ${{ steps.emit.outputs.ai_to_merge_ratio }}

runs:
  using: 'composite'
  steps:
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ env.PRISM_AWS_ROLE_ARN }}
        aws-region: ${{ inputs.aws-region }}

    - name: Emit PRISM metrics
      id: emit
      shell: bash
      env:
        PRISM_EVENT_TYPE: ${{ inputs.event-type }}
        PRISM_TEAM_ID: ${{ inputs.team-id }}
        PRISM_EVENT_BUS: ${{ inputs.event-bus-name }}
        PRISM_BASE_REF: ${{ inputs.base-ref }}
        PRISM_REPO: ${{ github.repository }}
        PRISM_SHA: ${{ github.sha }}
        PRISM_REF: ${{ github.ref }}
        PRISM_PR_NUMBER: ${{ github.event.pull_request.number }}
        PRISM_PR_CREATED_AT: ${{ github.event.pull_request.created_at }}
        PRISM_WORKFLOW_RUN_ID: ${{ github.run_id }}
      run: ${{ github.action_path }}/emit-metrics.sh
